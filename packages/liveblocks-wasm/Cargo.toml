[package]
name = "liveblocks-wasm"
version = "0.1.0"
edition = "2024"

# wasm-opt bundled with wasm-pack needs explicit feature flags for
# bulk-memory and nontrapping-float-to-int (standard since 2019,
# supported in all modern browsers and Node.js 12+).
[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O", "--enable-bulk-memory", "--enable-nontrapping-float-to-int"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"
slotmap = { version = "1", features = ["serde"] }
js-sys = "0.3"
serde_repr = "0.1.20"
indexmap = { version = "2", features = ["serde"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
