[project]
name = "liveblocks"
version = "0.1.0"
description = "A client library for accessing API v2"
authors = []
requires-python = ">=3.10"
readme = "README.md"
dependencies = [
    "httpx>=0.23.0,<0.29.0",
    "attrs>=22.2.0",
    "python-dateutil>=2.8.0,<3",
]

[dependency-groups]
dev = [
    "pytest>=9.0",
    "pytest-cov>=7.0",
    "respx>=0.22.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["liveblocks"]
omit = [
    "liveblocks/models/*",
    "liveblocks/api/*",
]

[tool.coverage.report]
show_missing = true
fail_under = 0

[tool.uv.build-backend]
module-name = "liveblocks"
module-root = ""

[build-system]
requires = ["uv_build>=0.10.0,<0.11.0"]
build-backend = "uv_build"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["F", "I", "UP"]
