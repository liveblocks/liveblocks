name: E2E Todo List

on:
  pull_request:
    paths:
      - "examples/nextjs-todo-list/**"
      - ".github/workflows/e2e-todo-list.yml"

jobs:
  e2e-todo-list:
    runs-on: ubuntu-latest

    services:
      liveblocks:
        image: ghcr.io/liveblocks/dev-server:sha-59d071a
        ports:
          - 1153:1153

    strategy:
      matrix:
        node-version: [22.21.0]

    timeout-minutes: 30

    env:
      NEXT_PUBLIC_LIVEBLOCKS_PUBLIC_KEY: pk_localdev
      NEXT_PUBLIC_LIVEBLOCKS_BASE_URL: http://localhost:1153

    defaults:
      run:
        working-directory: examples/nextjs-todo-list

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: examples/nextjs-todo-list/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Wait for Liveblocks dev server
        working-directory: .
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:1153/ > /dev/null 2>&1; then
              echo "Liveblocks dev server is ready"
              exit 0
            fi
            echo "Waiting for Liveblocks dev server... ($i/30)"
            sleep 1
          done
          echo "::error::Liveblocks dev server failed to start"
          exit 1

      - name: Build
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test --retries=5

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: todo-list-playwright-report
          path: examples/nextjs-todo-list/playwright-report
          retention-days: 14
