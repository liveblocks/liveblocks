name: E2E Todo List

on:
  push:
    branches:
      - mz2/todo-playwright-tests

jobs:
  e2e-todo-list:
    runs-on: ubuntu-latest

    services:
      liveblocks:
        image: ghcr.io/liveblocks/dev-server:sha-7fc2281
        env:
          LIVEBLOCKS_DEVSERVER_HOST: "0.0.0.0"
        ports:
          - 1153:1153

    strategy:
      matrix:
        node-version: [22.21.0]

    timeout-minutes: 30

    env:
      NEXT_PUBLIC_LIVEBLOCKS_PUBLIC_KEY: pk_localdev
      NEXT_PUBLIC_LIVEBLOCKS_BASE_URL: http://localhost:1153

    defaults:
      run:
        working-directory: examples/nextjs-todo-list

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: examples/nextjs-todo-list/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Verify dev server is reachable from host
        working-directory: .
        run: |
          curl -sf http://localhost:1153/health || {
            echo "ERROR: Dev server is not reachable at http://localhost:1153"
            echo "The server may have bound to localhost instead of 0.0.0.0 inside the container."
            exit 1
          }
          echo "Dev server is reachable."

      - name: Build
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test --retries=5

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: todo-list-playwright-report
          path: examples/nextjs-todo-list/playwright-report
          retention-days: 14
