name: Regenerate Python SDK

on:
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Regenerate SDK
        run: ./generate.sh
        working-directory: packages/liveblocks-python

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: regenerate Python SDK from OpenAPI spec"
          title: "chore: regenerate Python SDK"
          body: |
            This PR was auto-generated by the "Regenerate Python SDK" workflow.

            It regenerates `packages/liveblocks-python/liveblocks_api_client/` from the latest `docs/references/v2.openapi.json`.
          branch: chore/regenerate-python-sdk
          delete-branch: true
